volumes:
  signal_flow_data:
  pgadmin_data:
  ollama_data:

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: signal-flow-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: signal_flow
    ports:
      - "5433:5432"
    volumes:
      - signal_flow_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
      - ./migrations:/migrations

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: on-failure
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: postgres@postgres.com
      PGADMIN_DEFAULT_PASSWORD: postgres
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  ollama:
    image: ollama/ollama:latest
    container_name: signal-flow-ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  ollama-init:
    image: curlimages/curl:latest
    container_name: signal-flow-ollama-init
    depends_on:
      - ollama
    entrypoint: ["/bin/sh", "/scripts/init-ollama.sh"]
    volumes:
      - ./scripts/init-ollama.sh:/scripts/init-ollama.sh:ro

