services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: signal-flow-db
    environment:
      POSTGRES_USER: signalflow
      POSTGRES_PASSWORD: signalflow
      POSTGRES_DB: signal_flow_dev
    ports:
      - "5433:5432"
    volumes:
      - signal_flow_data:/var/lib/postgresql/data

volumes:
  signal_flow_data:
